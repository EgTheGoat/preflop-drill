<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>プリフロップトレーナー</title>

    <!-- ホーム画面追加（スタンドアロン）でアプリのように表示する設定 -->
    <meta name="theme-color" content="#0f1b24" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="プリフロップトレーナー" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iOS Safari の dvh 初回ロードバグ対策: window.innerHeight を --vh に設定 -->
    <script>document.documentElement.style.setProperty('--vh', window.innerHeight + 'px')</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
